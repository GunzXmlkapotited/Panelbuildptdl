name: Install Pterodactyl Panel with Cloudflare Tunnel

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  install-pterodactyl:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Update system and install dependencies
      run: |
        sudo apt update
        sudo apt install -y curl wget git unzip \
          software-properties-common \
          mariadb-server mariadb-client \
          nginx \
          redis-server \
          certbot python3-certbot-nginx
        sudo systemctl start mariadb
        sudo systemctl enable mariadb
        sudo systemctl start redis-server
        sudo systemctl enable redis-server
    
    - name: Install PHP 8.1 and extensions
      run: |
        sudo add-apt-repository -y ppa:ondrej/php
        sudo apt update
        sudo apt install -y php8.1 php8.1-cli php8.1-common \
          php8.1-mysql php8.1-xml php8.1-curl php8.1-zip \
          php8.1-gd php8.1-mbstring php8.1-bcmath \
          php8.1-fpm php8.1-redis php8.1-intl
        sudo systemctl start php8.1-fpm
        sudo systemctl enable php8.1-fpm
    
    - name: Install Composer
      run: |
        curl -sS https://getcomposer.org/installer | sudo php -- --install-dir=/usr/local/bin --filename=composer
    
    - name: Download Pterodactyl Panel
      run: |
        cd /var/www
        sudo mkdir -p pterodactyl
        sudo chown -R $USER:$USER /var/www/pterodactyl
        cd pterodactyl
        curl -Lo panel.tar.gz https://github.com/pterodactyl/panel/releases/latest/download/panel.tar.gz
        tar -xzvf panel.tar.gz
        chmod -R 755 storage/* bootstrap/cache/
    
    - name: Configure environment
      run: |
        cd /var/www/pterodactyl
        cp .env.example .env
        php artisan key:generate --force
    
    - name: Install dependencies with Composer
      run: |
        cd /var/www/pterodactyl
        composer install --no-dev --optimize-autoloader
    
    - name: Setup Database
      run: |
        sudo mysql -e "CREATE DATABASE IF NOT EXISTS pterodactyl;"
        sudo mysql -e "CREATE USER IF NOT EXISTS 'pterodactyl'@'localhost' IDENTIFIED BY 'password123';"
        sudo mysql -e "GRANT ALL PRIVILEGES ON pterodactyl.* TO 'pterodactyl'@'localhost';"
        sudo mysql -e "FLUSH PRIVILEGES;"
    
    - name: Configure .env file
      run: |
        cd /var/www/pterodactyl
        sed -i 's/DB_DATABASE=.*/DB_DATABASE=pterodactyl/' .env
        sed -i 's/DB_USERNAME=.*/DB_USERNAME=pterodactyl/' .env
        sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=password123/' .env
        sed -i 's/APP_ENV=.*/APP_ENV=production/' .env
        sed -i 's/APP_DEBUG=.*/APP_DEBUG=false/' .env
        sed -i 's/APP_URL=.*/APP_URL=https:\/\/your-domain.com/' .env
    
    - name: Run migrations and seeders
      run: |
        cd /var/www/pterodactyl
        php artisan migrate --force
        php artisan db:seed --force
    
    - name: Setup admin user
      run: |
        cd /var/www/pterodactyl
        php artisan p:user:make \
          --email=admin@example.com \
          --username=admin \
          --name-first=Admin \
          --name-last=User \
          --password=admin123 \
          --admin=1
    
    - name: Set permissions
      run: |
        cd /var/www/pterodactyl
        sudo chown -R www-data:www-data /var/www/pterodactyl/*
        sudo chmod -R 755 /var/www/pterodactyl/storage /var/www/pterodactyl/bootstrap/cache
    
    - name: Configure Nginx for Cloudflare Tunnel
      run: |
        sudo rm -rf /etc/nginx/sites-enabled/default
        sudo tee /etc/nginx/sites-available/pterodactyl > /dev/null <<EOF
        server {
            listen 127.0.0.1:8080; # Tunnel akan akses ke port ini
            server_name _;
            root /var/www/pterodactyl/public;
            index index.php index.html;
            
            location / {
                try_files \$uri \$uri/ /index.php?\$query_string;
            }
            
            location ~ \.php$ {
                include snippets/fastcgi-php.conf;
                fastcgi_pass unix:/run/php/php8.1-fpm.sock;
            }
            
            location ~ /\.ht {
                deny all;
            }
            
            # Security headers untuk Cloudflare
            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-Content-Type-Options "nosniff";
            add_header X-XSS-Protection "1; mode=block";
        }
        EOF
        sudo ln -s /etc/nginx/sites-available/pterodactyl /etc/nginx/sites-enabled/
        
        # Ubah nginx listen ke port 8080
        sudo sed -i 's/listen 80;/listen 127.0.0.1:8080;/' /etc/nginx/sites-available/pterodactyl
        sudo nginx -t
        sudo systemctl restart nginx
    
    - name: Install and configure Cloudflared
      run: |
        # Download cloudflared
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
        sudo chmod +x /usr/local/bin/cloudflared
        
        # Buat direktori config
        sudo mkdir -p /etc/cloudflared
        
        # Buat config file
        sudo tee /etc/cloudflared/config.yml > /dev/null <<EOF
        tunnel: 7a5ab7dc-e7ec-45b0-9e3f-173a18c10846
        credentials-file: /etc/cloudflared/credentials.json
        loglevel: info

        ingress:
          - hostname: your-domain.com
            service: http://localhost:8080
          - service: http_status:404
        EOF
        
        # Simpan token ke file credentials
        echo '{"AccountTag":"cad61a3e2c99c2cb7b05462e41f57bc56","TunnelID":"7a5ab7dc-e7ec-45b0-9e3f-173a18c10846","TunnelSecret":"YzJjOWIwMTk5YjFjZDY5ZGJkZThlMTQzZjZiZmU2MTU4OGI5YTVmYg=="}' | sudo tee /etc/cloudflared/credentials.json
        
        # Buat systemd service
        sudo tee /etc/systemd/system/cloudflared.service > /dev/null <<EOF
        [Unit]
        Description=Cloudflare Tunnel
        After=network.target

        [Service]
        Type=simple
        ExecStart=/usr/local/bin/cloudflared tunnel run --token eyJhIjoiY2FkNjFhM2UyYzk5Y2NiN2IwNTQ2MmU0MWY1N2JjNTYiLCJ0IjoiN2E1YWI3ZGMtZTdlYy00NWIwLTllM2YtMTczYTE4YzEwODQ2IiwicyI6Ill6SmpPV0l3TURNdFl6RmtaQzAwWVRRMkxUbG1NR1F0TTJRMFpUTmpabU5tTVRsbCJ9
        Restart=always
        RestartSec=5
        User=root

        [Install]
        WantedBy=multi-user.target
        EOF
        
        sudo systemctl daemon-reload
        sudo systemctl enable cloudflared
        sudo systemctl start cloudflared
    
    - name: Setup queue worker
      run: |
        sudo tee /etc/systemd/system/pteroq.service > /dev/null <<EOF
        [Unit]
        Description=Pterodactyl Queue Worker
        After=redis-server.service

        [Service]
        User=www-data
        WorkingDirectory=/var/www/pterodactyl
        ExecStart=/usr/bin/php artisan queue:work --queue=high,standard,low --sleep=3 --tries=3
        Restart=always

        [Install]
        WantedBy=multi-user.target
        EOF
        sudo systemctl daemon-reload
        sudo systemctl enable pteroq
        sudo systemctl start pteroq
    
    - name: Setup scheduler cron
      run: |
        (sudo crontab -l 2>/dev/null; echo "* * * * * php /var/www/pterodactyl/artisan schedule:run >> /dev/null 2>&1") | sudo crontab -
    
    - name: Verify services
      run: |
        echo "Checking services..."
        systemctl status nginx --no-pager
        systemctl status php8.1-fpm --no-pager
        systemctl status mariadb --no-pager
        systemctl status redis-server --no-pager
        systemctl status cloudflared --no-pager
        
        # Test tunnel
        sleep 10
        curl -I http://localhost:8080
    
    - name: Display access information
      run: |
        echo "=========================================="
        echo "✅ Pterodactyl Panel Installation Complete!"
        echo "🌐 Access via Cloudflare Tunnel:"
        echo "   https://your-domain.com"
        echo ""
        echo "🔑 Admin Login:"
        echo "   Email: admin@example.com"
        echo "   Password: admin123"
        echo ""
        echo "🔧 Cloudflare Tunnel Status:"
        sudo systemctl status cloudflared --no-pager | grep Active
        echo ""
        echo "📋 To check tunnel logs:"
        echo "   sudo journalctl -u cloudflared -f"
        echo "=========================================="
